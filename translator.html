<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中日翻譯</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e2e2de;
    --text: #1a1a18;
    --muted: #6b6b66;
    --hint: #a8a8a2;
    --accent: #1a1a18;
    --accent-bg: #f0f0ec;
    --red: #e24b4a;
    --radius: 14px;
    --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    padding: 20px 20px 0;
    text-align: center;
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .lang-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 18px 20px 14px;
  }
  .lang-pill {
    flex: 1;
    max-width: 140px;
    text-align: center;
    padding: 9px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .swap-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .swap-btn:active { background: var(--accent-bg); }

  .card {
    margin: 0 16px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--accent-bg);
  }
  .card-header span {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }
  .mic-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mic-btn.recording {
    background: #fff0f0;
    border-color: var(--red);
    color: var(--red);
  }
  .mic-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    display: none;
    animation: blink 1s infinite;
  }
  .mic-btn.recording .dot { display: inline-block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  textarea {
    width: 100%;
    min-height: 130px;
    border: none;
    outline: none;
    resize: none;
    padding: 14px;
    font-size: 16px;
    line-height: 1.65;
    background: transparent;
    color: var(--text);
    font-family: inherit;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .char-count { font-size: 12px; color: var(--hint); }
  .copy-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .copy-btn:active { background: var(--accent-bg); }

  .output-box {
    min-height: 130px;
    padding: 14px;
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .placeholder { color: var(--hint); font-size: 14px; }

  .translate-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: calc(100% - 32px);
    margin: 4px 16px 0;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--text);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .translate-btn:active { opacity: 0.8; }
  .translate-btn.loading { opacity: 0.6; pointer-events: none; }

  .status {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    padding: 0 20px;
  }
  .status.err { color: var(--red); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>中日翻譯</h1>
  <p>文字 ＋ 語音輸入，雙向翻譯</p>
</header>

<div class="lang-bar">
  <div class="lang-pill" id="src-label">中文</div>
  <button class="swap-btn" onclick="swapLang()" aria-label="對調語言">⇄</button>
  <div class="lang-pill" id="tgt-label">日文</div>
</div>

<div class="card">
  <div class="card-header">
    <span id="src-panel-label">輸入中文</span>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      <span class="dot"></span>
      <span id="mic-text">🎙 語音</span>
    </button>
  </div>
  <textarea id="input-text" placeholder="在這裡輸入文字，或點語音按鈕說話…" oninput="onInput()"></textarea>
  <div class="card-footer">
    <span class="char-count" id="char-count">0 字</span>
    <button class="copy-btn" onclick="copyInput()">複製</button>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span id="tgt-panel-label">翻譯結果（日文）</span>
  </div>
  <div class="output-box" id="output-box">
    <span class="placeholder">翻譯結果會顯示在這裡</span>
  </div>
  <div class="card-footer">
    <span class="char-count" id="result-count"></span>
    <button class="copy-btn" onclick="copyOutput()">複製</button>
  </div>
</div>

<button class="translate-btn" id="translate-btn" onclick="doTranslate()">
  <span id="btn-icon">🌐</span>
  <span id="btn-text">翻譯</span>
</button>

<div class="status" id="status"></div>
<div class="toast" id="toast"></div>

<script>
let srcLang = 'zh';
let recognition = null;
let isRecording = false;
let debounceTimer = null;

function swapLang() {
  srcLang = srcLang === 'zh' ? 'ja' : 'zh';
  const isZh = srcLang === 'zh';
  document.getElementById('src-label').textContent = isZh ? '中文' : '日文';
  document.getElementById('tgt-label').textContent = isZh ? '日文' : '中文';
  document.getElementById('src-panel-label').textContent = isZh ? '輸入中文' : '輸入日文';
  document.getElementById('tgt-panel-label').textContent = isZh ? '翻譯結果（日文）' : '翻譯結果（中文）';
  document.getElementById('input-text').placeholder = isZh ? '在這裡輸入文字，或點語音按鈕說話…' : 'ここに日本語を入力してください…';

  const prevResult = document.getElementById('output-box').textContent.trim();
  if (prevResult && !document.querySelector('#output-box .placeholder')) {
    document.getElementById('input-text').value = prevResult;
    document.getElementById('output-box').innerHTML = '<span class="placeholder">翻譯結果會顯示在這裡</span>';
    document.getElementById('char-count').textContent = prevResult.length + ' 字';
  }
}

function onInput() {
  const txt = document.getElementById('input-text').value;
  document.getElementById('char-count').textContent = txt.length + ' 字';
  clearTimeout(debounceTimer);
  if (txt.trim().length > 1) {
    debounceTimer = setTimeout(doTranslate, 900);
  }
}

async function doTranslate() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { setStatus('請先輸入文字'); return; }
  const btn = document.getElementById('translate-btn');
  const btnText = document.getElementById('btn-text');
  const btnIcon = document.getElementById('btn-icon');
  btn.classList.add('loading');
  btnText.textContent = '翻譯中…';
  btnIcon.textContent = '';
  btnIcon.innerHTML = '<span class="spinner"></span>';
  setStatus('');

  const out = document.getElementById('output-box');
  out.innerHTML = '<span class="placeholder"><span class="spinner"></span> 翻譯中…</span>';

  const prompt = srcLang === 'zh'
    ? '請將以下中文翻譯成日文，只回傳翻譯結果，不要任何解釋或多餘文字：\n\n' + text
    : '請將以下日文翻譯成繁體中文，只回傳翻譯結果，不要任何解釋或多餘文字：\n\n' + text;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const result = data.content?.[0]?.text?.trim() || '';
    if (result) {
      out.textContent = result;
      document.getElementById('result-count').textContent = result.length + ' 字';
      setStatus('✓ 翻譯完成');
    } else {
      out.innerHTML = '<span class="placeholder">翻譯失敗，請再試一次</span>';
      setStatus('發生錯誤', true);
    }
  } catch(e) {
    out.innerHTML = '<span class="placeholder">連線失敗，請檢查網路</span>';
    setStatus('連線失敗', true);
  }

  btn.classList.remove('loading');
  btnText.textContent = '翻譯';
  btnIcon.innerHTML = '';
  btnIcon.textContent = '🌐';
}

function toggleMic() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    setStatus('您的瀏覽器不支援語音，請用 Chrome', true);
    return;
  }
  if (isRecording) { recognition && recognition.stop(); return; }
  recognition = new SpeechRec();
  recognition.lang = srcLang === 'zh' ? 'zh-TW' : 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-text').textContent = '停止';
    setStatus('🎙 請說話…');
  };
  recognition.onresult = (e) => {
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
    }
    if (final) {
      document.getElementById('input-text').value = final;
      document.getElementById('char-count').textContent = final.length + ' 字';
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doTranslate, 400);
    }
  };
  recognition.onerror = () => setStatus('語音識別失敗，請再試', true);
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-text').textContent = '🎙 語音';
    if (!document.getElementById('status').textContent.includes('完成')) setStatus('');
  };
  recognition.start();
}

function copyInput() {
  const t = document.getElementById('input-text').value;
  if (t) { navigator.clipboard.writeText(t).then(() => showToast('已複製輸入文字')); }
}
function copyOutput() {
  const box = document.getElementById('output-box');
  const t = box.querySelector('.placeholder') ? '' : box.textContent.trim();
  if (t) { navigator.clipboard.writeText(t).then(() => showToast('已複製翻譯結果')); }
}

function setStatus(msg, isErr=false) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (isErr ? ' err' : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
